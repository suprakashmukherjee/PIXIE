<!DOCTYPE html>
<html>

<head>
    <title>PIXIE RAW File Manager</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >
</head>

<body>

<div class="container">

    <h1>PIXIE RAW File Manager</h1>

    <div class="card">

        <label>
            Source Photo Library
        </label>

        <input
            type="text"
            id="sourcePath"
            placeholder="C:\Photos or /Users/name/Photos"
        >

        <label>
            Delete Folder
        </label>

        <input
            type="text"
            id="deleteFolder"
            placeholder="C:\PIXIE_DELETE"
        >

        <div class="checkbox-row">

            <label>
                <input
                    type="checkbox"
                    id="dryRun"
                    checked
                >
                Dry Run
            </label>

        </div>

        <div class="checkbox-row">

            <label>
                <input
                    type="checkbox"
                    id="deleteAfterMove"
                >
                Delete After Move
            </label>

        </div>

        <button onclick="runScan()">
            Scan Library
        </button>

    </div>

    <div
        id="results"
        class="card hidden"
    >

        <h2>Results</h2>

        <div id="summary"></div>

        <table id="orphansTable">

            <thead>
                <tr>
                    <th>RAW File</th>
                    <th>Source Path</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
